<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRONOS | Advanced Software Suite & Tactical AI Architectures</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #030712;
            --bg-surface: #0b0f19;
            --bg-surface-elevated: #111827;
            --accent-cyan: #00f0ff;
            --accent-blue: #3b82f6;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-glow: rgba(0, 240, 255, 0.15);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --gradient-primary: linear-gradient(135deg, #00f0ff 0%, #3b82f6 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-cyan); }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            background: rgba(3, 7, 18, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-subtle);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--accent-cyan);
            text-shadow: 0 0 8px var(--border-glow);
        }

        .lang-switch {
            display: flex;
            gap: 10px;
            background: var(--bg-surface);
            padding: 4px 8px;
            border-radius: 20px;
            border: 1px solid var(--border-subtle);
        }

        .lang-switch a {
            padding: 4px 10px;
            border-radius: 14px;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .lang-switch a.active {
            background: var(--gradient-primary);
            color: var(--bg-base);
        }

        /* Hero Section */
        header {
            position: relative;
            padding: 160px 20px 80px 20px;
            text-align: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .hero-badge {
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.2);
            color: var(--accent-cyan);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 24px;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.05);
        }

        header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 64px;
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -1px;
            margin-bottom: 20px;
        }

        header h1 span {
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header .subtitle {
            font-size: 18px;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto 40px auto;
        }

        /* Dashboard Status Grid */
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto 80px auto;
        }

        .status-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 20px;
            text-align: left;
            transition: all 0.3s ease;
        }

        .status-card:hover {
            border-color: rgba(0, 240, 255, 0.3);
            transform: translateY(-2px);
        }

        .status-card .label {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .status-card .val {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
        }

        .status-card .val span {
            color: var(--accent-cyan);
        }

        /* Core Section Layout */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .section-header {
            margin-bottom: 40px;
            position: relative;
        }

        .section-header h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .section-header p {
            color: var(--text-muted);
            font-size: 15px;
        }

        /* Software Grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 24px;
            margin-bottom: 100px;
        }

        .project-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(800px circle at var(--x, 0px) var(--y, 0px), rgba(0, 240, 255, 0.04), transparent 40%);
            border-radius: 16px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .project-card:hover {
            transform: translateY(-4px);
            border-color: rgba(0, 240, 255, 0.25);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
        }

        .project-info h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .project-info h3 .version {
            font-size: 11px;
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 8px;
            border-radius: 20px;
            color: var(--accent-cyan);
            border: 1px solid rgba(0, 240, 255, 0.1);
        }

        .project-info p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 20px;
            height: 72px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .btn-download {
            background: var(--gradient-primary);
            color: var(--bg-base);
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(0, 240, 255, 0.2);
        }

        .btn-download:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 240, 255, 0.4);
        }

        .tag-tech {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.03);
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid var(--border-subtle);
        }

        /* Nexus: Kronos AI Roadmap Section */
        .nexus-section {
            background: radial-gradient(ellipse at center, rgba(17, 24, 39, 0.6) 0%, var(--bg-base) 100%);
            border: 1px solid var(--border-subtle);
            border-radius: 24px;
            padding: 60px 40px;
            margin-bottom: 100px;
            position: relative;
        }

        .nexus-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .nexus-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
        }

        .nexus-item:hover {
            background: rgba(0, 240, 255, 0.02);
            border-color: rgba(0, 240, 255, 0.2);
        }

        .nexus-icon {
            font-size: 28px;
            margin-bottom: 14px;
        }

        .nexus-item h4 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .nexus-item p {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Future Pipeline (WIP) */
        .pipeline-box {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 100px;
        }

        .pipeline-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border-subtle);
        }

        .pipeline-item:last-child { border-bottom: none; }

        .pipeline-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .pipeline-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f59e0b;
            box-shadow: 0 0 8px #f59e0b;
        }

        .pipeline-status.active {
            background: var(--accent-cyan);
            box-shadow: 0 0 8px var(--accent-cyan);
        }

        .pipeline-name {
            font-weight: 600;
            font-size: 15px;
        }

        .pipeline-desc {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Footer */
        footer {
            border-top: 1px solid var(--border-subtle);
            padding: 40px 20px;
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
        }

        footer span { color: var(--text-main); font-weight: 500; }
        footer a { color: var(--accent-cyan); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        @media (max-width: 768px) {
            header h1 { font-size: 42px; }
            nav { padding: 20px; }
            .nav-links { display: none; } /* Simplified for mobile */
        }
    </style>
</head>
